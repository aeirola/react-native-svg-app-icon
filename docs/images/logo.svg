<svg xmlns="http://www.w3.org/2000/svg"
    width="200" height="200"
    viewBox="-10 -10 120 120">
  <defs>
    

    <ellipse id="orbit" cx="50" cy="50" rx="46.5" ry="18.3"/>
    <g id="orbits" fill="none">
      <use href="#orbit" />
      <use href="#orbit" transform="rotate(120 50 50)"/>
      <use href="#orbit" transform="rotate(240 50 50)"/>
    </g>

    <path id="top-left-path"
      d="M30,100 L80,0 L0,0 L0,100 Z" />

    <mask id="top-left-mask">
      <use href="#top-left-path" fill="white" />
    </mask>
  </defs>

  <rect x="-10" y="-10" width="120" height="120"
    rx="20" ry="20" fill="#f8f8f8" />

  <g stroke="#ffb13b" stroke-width="1.5"
     stroke-dasharray="5.1" stroke-linecap="round">
    <use href="#orbits" />
    <circle cx="50" cy="50" fill="none" r="8" />
  </g>

  <g opacity="0.2">
    <use href="#orbits" stroke="#ffb13b" stroke-width="4.5" />
    <circle cx="50" cy="50" fill="#ffb13b" r="9" />
  </g>

  <g mask="url(#top-left-mask)">
    <use href="#orbits" stroke="#61dafb" stroke-width="4.5" />
    <circle cx="50" cy="50" fill="#61dafb" r="9" />
  </g>

  <use href="#top-left-path" fill="none"
      stroke="#2e2e2e" stroke-width="4"
      stroke-dashoffset="-1" stroke-dasharray="105 999"
      stroke-linecap="round" />
</svg>
